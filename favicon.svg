<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b57edc"/>
      <stop offset="50%" style="stop-color:#9b4dca"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="maskGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffb6c1"/>
      <stop offset="100%" style="stop-color:#ff69b4"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bgGrad)"/>
  
  <!-- Mask shape -->
  <ellipse cx="32" cy="30" rx="18" ry="16" fill="url(#maskGrad)"/>
  
  <!-- Left eye -->
  <ellipse cx="26" cy="28" rx="4" ry="5" fill="#4a3a5c"/>
  <ellipse cx="27" cy="27" rx="1.5" ry="2" fill="white"/>
  
  <!-- Right eye -->
  <ellipse cx="38" cy="28" rx="4" ry="5" fill="#4a3a5c"/>
  <ellipse cx="39" cy="27" rx="1.5" ry="2" fill="white"/>
  
  <!-- Question mark -->
  <text x="32" y="54" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">?</text>
</svg>